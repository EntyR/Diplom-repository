version: "3.9"

services:

  # ── 1. Векторная БД ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── 2. Python embed-сервис (InsightFace) ────────────────────────────────────
  embed-service:
    build: ./embed-service
    ports:
      - "8001:8001"
    environment:
      MODEL_TAG: buffalo_l
      CUDA_ON: "false"
      LOG_FACES: "false"
    volumes:
      - insightface_cache:/root/.insightface

  # ── 3. Go API-сервис ─────────────────────────────────────────────────────────
  biometric-api:
    build: ./biometric-go
    ports:
      - "8080:8080"
    environment:
      QDRANT_ADDR: qdrant:6334
      EMBED_URL: http://embed-service:8001
      MATCH_CUTOFF: "0.35"
      PERSONS_COL: persons
      PORTRAITS_COL: portraits
    depends_on:
      - qdrant
      - embed-service
    restart: on-failure

volumes:
  qdrant_data:
  insightface_cache:
