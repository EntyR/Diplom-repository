version: "3.9"

services:

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  embed-service:
    build: ./embed-service
    ports:
      - "8001:8001"
    environment:
      MODEL_TAG: buffalo_l
      CUDA_ON: "false"
      LOG_FACES: "false"
    volumes:
      - insightface_cache:/root/.insightface

  biometric-api:
    build: ./biometric-go
    ports:
      - "8080:8080"
    environment:
      QDRANT_ADDR: qdrant:6334
      EMBED_URL: http://embed-service:8001
      MATCH_CUTOFF: "0.35"
      PERSONS_COL: persons
      PORTRAITS_COL: portraits
    depends_on:
      - qdrant
      - embed-service
    restart: on-failure

  frontend:
    build: ./face-recognition-app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://YOUR_SERVER_IP:8080
    depends_on:
      - biometric-api

volumes:
  qdrant_data:
  insightface_cache: